<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Namozlarim — qayta tuzilgan</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #f7f5ef;
      --surface: #ffffff;
      --surface-soft: #fbfaf6;
      --surface-tint: #edf6f1;
      --text: #17263a;
      --text-soft: #4f6072;
      --muted: #7a8794;
      --line: #e7ece5;
      --line-strong: #d6dfd3;
      --primary: #2f7d5b;
      --primary-dark: #246146;
      --primary-soft: #eaf5ef;
      --blue: #3a73d9;
      --blue-soft: #eef4ff;
      --warning: #c98724;
      --warning-soft: #fff5e5;
      --danger: #c94d4d;
      --danger-soft: #fdeeee;
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --shadow-card: 0 12px 28px rgba(23, 38, 58, .06);
      --nav-h: 92px;
      --tap: 48px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% -8%, rgba(47, 125, 91, .11), transparent 28%),
        radial-gradient(circle at 96% 0%, rgba(58, 115, 217, .08), transparent 26%),
        linear-gradient(180deg, #fbfaf6 0%, var(--bg) 100%);
      line-height: 1.42;
      letter-spacing: -.012em;
      max-width: 840px;
      margin: 0 auto;
      padding: 12px 12px calc(var(--nav-h) + 20px);
    }

    button, input { font: inherit; }
    button { border: 0; background: none; color: inherit; cursor: pointer; }
    button:disabled { opacity: .52; cursor: not-allowed; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: var(--tap) minmax(0, 1fr) var(--tap);
      gap: 10px;
      align-items: center;
      min-height: 64px;
      padding: 4px 0 10px;
      background: linear-gradient(180deg, rgba(251, 250, 246, .96), rgba(251, 250, 246, .82) 72%, rgba(251, 250, 246, 0));
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .icon-button {
      width: var(--tap);
      height: var(--tap);
      border-radius: 18px;
      background: rgba(255, 255, 255, .9);
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      font-size: 20px;
    }

    .app-title { text-align: center; min-width: 0; }
    .app-title h1 { font-size: 23px; line-height: 1; font-weight: 900; letter-spacing: -.06em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .app-title p { color: var(--muted); font-size: 12px; font-weight: 740; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .screen { display: none; animation: fade .16s ease; }
    .screen.active { display: block; }
    @keyframes fade { from { opacity: .72; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .section { margin-bottom: 14px; }
    .section-title { display: flex; justify-content: space-between; align-items: end; gap: 12px; margin: 20px 6px 10px; }
    .section-title h2 { font-size: 18px; font-weight: 900; letter-spacing: -.04em; }
    .section-title span { color: var(--muted); font-size: 12px; font-weight: 760; }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    .card-pad { padding: 16px; }

    .hero {
      padding: 18px;
      border-color: #d7e7dc;
      background:
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.84)),
        radial-gradient(circle at 10% 0%, rgba(47, 125, 91, .14), transparent 35%);
    }
    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--primary);
      background: var(--primary-soft);
      border: 1px solid #d4eadf;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 12px;
    }
    .hero h2 { font-size: 28px; line-height: 1.04; letter-spacing: -.065em; font-weight: 940; }
    .hero p { color: var(--text-soft); font-size: 14px; font-weight: 680; margin-top: 6px; }

    .overview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
    .overview-card {
      min-height: 72px;
      padding: 12px;
      border-radius: var(--radius-lg);
      background: var(--surface);
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .overview-card.primary { color: var(--primary); background: var(--primary-soft); border-color: #d4eadf; }
    .overview-card span { color: var(--muted); font-size: 11px; font-weight: 860; text-transform: uppercase; letter-spacing: .02em; }
    .overview-card strong { font-size: 17px; font-weight: 930; letter-spacing: -.04em; margin-top: 4px; }
    .overview-card.primary span { color: var(--primary); opacity: .8; }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 14px; }
    .btn {
      min-height: 50px;
      border-radius: 17px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      font-size: 15px;
      font-weight: 900;
      border: 1px solid transparent;
    }
    .btn.full { width: 100%; margin-top: 10px; }
    .btn.primary { background: var(--primary); color: #fff; box-shadow: 0 12px 22px rgba(47, 125, 91, .18); }
    .btn.dark { background: #17263a; color: #fff; }
    .btn.green { color: var(--primary); background: var(--primary-soft); border-color: #cfe7da; }
    .btn.blue { color: var(--blue); background: var(--blue-soft); border-color: #dbe8ff; }
    .btn.red { color: var(--danger); background: var(--danger-soft); border-color: #f4d0d0; }
    .btn.gray { color: var(--text-soft); background: var(--surface-soft); border-color: var(--line); }
    .btn.link { min-height: 38px; padding: 0; border: 0; background: transparent; color: var(--blue); }

    .list-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 58px 112px;
      gap: 10px;
      align-items: center;
      min-height: 76px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      width: 100%;
    }
    .list-row:last-child { border-bottom: 0; }
    .row-main { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .row-icon { width: 42px; height: 42px; border-radius: 16px; display: grid; place-items: center; background: var(--surface-soft); border: 1px solid var(--line); font-size: 20px; flex: none; }
    .row-text { min-width: 0; }
    .row-text strong { display: block; font-size: 16px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-text small { display: block; color: var(--muted); font-size: 12px; font-weight: 700; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-time { color: var(--text-soft); font-size: 15px; font-weight: 870; text-align: center; }
    .status-pill { justify-self: end; min-width: 104px; padding: 9px 10px; border-radius: 999px; font-size: 12px; font-weight: 900; text-align: center; border: 1px solid var(--line); background: var(--surface-soft); color: var(--muted); }
    .status-pill.success { background: var(--primary-soft); border-color: #cfe7da; color: var(--primary); }
    .status-pill.warning { background: var(--warning-soft); border-color: #f0dcb4; color: var(--warning); }
    .status-pill.danger { background: var(--danger-soft); border-color: #f4d0d0; color: var(--danger); }
    .status-pill.info { background: var(--blue-soft); border-color: #dbe8ff; color: var(--blue); }

    .progress-track { height: 12px; border-radius: 999px; background: #e9eee7; overflow: hidden; margin-top: 14px; }
    .progress-fill { height: 100%; width: 0; border-radius: inherit; background: linear-gradient(90deg, var(--primary), #69c58c); transition: width .18s ease; }

    .qazo-hero { padding: 18px; border-color: #d7e7dc; background: linear-gradient(180deg, #fff, #fbfdfb); }
    .qazo-top { display: flex; justify-content: space-between; align-items: start; gap: 14px; }
    .qazo-top h2 { font-size: 27px; line-height: 1.05; font-weight: 940; letter-spacing: -.06em; }
    .qazo-top p { color: var(--text-soft); font-size: 14px; font-weight: 680; margin-top: 6px; }
    .qazo-pill { color: var(--blue); background: var(--blue-soft); border: 1px solid #dbe8ff; border-radius: 999px; padding: 8px 11px; font-size: 12px; font-weight: 900; white-space: nowrap; }

    .task-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 68px 118px;
      gap: 10px;
      align-items: center;
      min-height: 74px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }
    .task-row:last-child { border-bottom: 0; }
    .task-title { font-size: 16px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-meta { color: var(--muted); font-size: 12px; font-weight: 700; margin-top: 2px; }
    .task-count { text-align: center; font-weight: 940; color: var(--text-soft); }
    .task-count span { color: var(--primary); }
    .task-action { min-height: 42px; border-radius: 15px; font-size: 13px; font-weight: 900; background: var(--primary-soft); color: var(--primary); border: 1px solid #cfe7da; }
    .task-action.done { color: var(--muted); background: var(--surface-soft); border-color: var(--line); }

    .balance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .balance-list { padding: 2px 14px; }
    .balance-row { min-height: 56px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--line); }
    .balance-row:last-child { border-bottom: 0; }
    .balance-row span { font-weight: 800; }
    .balance-row strong { font-size: 17px; font-weight: 930; }

    .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .action-card { min-height: 104px; padding: 14px 10px; border-radius: var(--radius-lg); background: var(--surface); border: 1px solid var(--line); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .action-card .big { width: 38px; height: 38px; display: grid; place-items: center; border-radius: 15px; color: var(--blue); background: var(--blue-soft); margin-bottom: 9px; font-size: 20px; }
    .action-card strong { font-size: 14px; font-weight: 900; }
    .action-card small { color: var(--muted); font-size: 11px; font-weight: 720; margin-top: 2px; }

    .calendar-card { padding: 14px; }
    .calendar-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .calendar-top strong { font-size: 18px; font-weight: 930; letter-spacing: -.035em; text-transform: capitalize; }
    .calendar-controls { display: flex; gap: 8px; }
    .calendar-controls button { width: 38px; height: 38px; border-radius: 14px; background: var(--surface-soft); border: 1px solid var(--line); font-size: 22px; font-weight: 900; color: var(--text-soft); }
    .week-grid, .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 7px; }
    .week-grid div { text-align: center; color: var(--muted); font-size: 11px; font-weight: 900; padding: 4px 0; }
    .day-cell { min-height: 54px; border-radius: 16px; border: 1px solid var(--line); background: var(--surface-soft); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
    .day-cell.empty { visibility: hidden; }
    .day-cell.future { opacity: .42; }
    .day-cell.today { border-color: #c7d9ff; box-shadow: 0 0 0 2px rgba(58, 115, 217, .08); }
    .day-cell.selected { background: var(--primary-soft); border-color: #cfe7da; }
    .day-number { font-size: 14px; font-weight: 940; }
    .day-status { min-height: 16px; font-size: 11px; font-weight: 940; color: var(--muted); }
    .day-status.good { color: var(--primary); }
    .day-status.bad { color: var(--danger); }
    .calendar-detail { margin-top: 12px; padding: 14px; border-radius: var(--radius-lg); border: 1px solid var(--line); background: var(--surface-soft); }
    .calendar-detail strong { font-size: 15px; font-weight: 940; }
    .calendar-detail p { color: var(--muted); font-size: 13px; font-weight: 700; margin-top: 4px; }

    .stats-hero { padding: 18px; }
    .stats-hero .eyebrow { color: var(--primary); font-size: 12px; font-weight: 900; margin-bottom: 4px; }
    .stats-hero h2 { font-size: 34px; line-height: 1.04; font-weight: 940; letter-spacing: -.075em; }
    .stats-hero p { color: var(--text-soft); font-size: 14px; font-weight: 700; margin-top: 7px; }
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .metric { padding: 16px; min-height: 112px; }
    .metric span { color: var(--muted); font-size: 12px; font-weight: 860; }
    .metric strong { display: block; font-size: 30px; font-weight: 940; letter-spacing: -.065em; margin-top: 5px; }
    .metric small { display: block; color: var(--muted); font-size: 13px; font-weight: 700; margin-top: 3px; }
    .text-primary { color: var(--primary); }
    .text-danger { color: var(--danger); }
    .text-blue { color: var(--blue); }

    .tip-card { padding: 16px; display: flex; gap: 12px; align-items: flex-start; background: linear-gradient(180deg, #fff, #fbfdfb); }
    .tip-icon { width: 42px; height: 42px; border-radius: 16px; display: grid; place-items: center; background: var(--blue-soft); color: var(--blue); flex: none; }
    .tip-card strong { font-size: 16px; font-weight: 940; }
    .tip-card p { color: var(--muted); font-size: 13px; font-weight: 700; margin-top: 4px; }

    .empty { padding: 18px; border-radius: var(--radius-lg); border: 1px solid #f0dfbd; background: linear-gradient(180deg, #fffdf8, #fff); }
    .empty strong { display: block; font-size: 16px; font-weight: 940; }
    .empty p { color: var(--text-soft); font-size: 13px; font-weight: 700; margin-top: 4px; }

    .app-footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-width: 840px;
      margin: 0 auto;
      z-index: 22;
      padding: 10px 10px 16px;
      background: linear-gradient(180deg, rgba(247,245,239,0), rgba(247,245,239,.92) 24%, rgba(247,245,239,.98));
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .nav-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; padding: 8px; border-radius: 26px; background: rgba(255, 255, 255, .9); border: 1px solid var(--line); box-shadow: 0 16px 34px rgba(23, 38, 58, .1); }
    .nav-item { min-height: 56px; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--muted); font-size: 11px; font-weight: 900; }
    .nav-item.active { color: var(--blue); background: var(--blue-soft); }
    .nav-item .ico { font-size: 20px; line-height: 1; }

    .modal { position: fixed; inset: 0; z-index: 50; display: none; align-items: flex-end; justify-content: center; padding: 0 10px; background: rgba(23, 38, 58, .22); }
    .modal.show { display: flex; }
    .sheet { width: 100%; max-width: 840px; max-height: 88vh; overflow: auto; background: rgba(255,255,255,.98); border: 1px solid rgba(255,255,255,.72); border-top-left-radius: 30px; border-top-right-radius: 30px; padding: 18px 14px 22px; box-shadow: 0 -18px 44px rgba(23, 38, 58, .15); }
    .modal.full { align-items: stretch; padding: 0; background: rgba(247,245,239,.98); }
    .modal.full .sheet { height: 100vh; max-height: 100vh; border-radius: 0; box-shadow: none; display: flex; flex-direction: column; }
    .modal-title { font-size: 22px; font-weight: 940; letter-spacing: -.045em; margin-bottom: 5px; }
    .modal-sub { color: var(--muted); font-size: 14px; font-weight: 700; white-space: pre-line; margin-bottom: 12px; }
    .modal-actions { display: grid; gap: 9px; }

    .input { width: 100%; min-height: 50px; border: 1px solid var(--line); border-radius: 16px; background: var(--surface-soft); color: var(--text); padding: 0 12px; font-weight: 820; outline: 0; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
    .form-label { color: var(--muted); font-size: 12px; font-weight: 900; margin: 0 0 6px 4px; }
    .seg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin: 12px 0; }
    .seg button { min-height: 42px; border-radius: 14px; background: var(--surface-soft); border: 1px solid var(--line); color: var(--text-soft); font-weight: 900; }
    .seg button.on { color: var(--blue); background: var(--blue-soft); border-color: #dbe8ff; }
    .stepper-list { display: grid; gap: 10px; margin-top: 12px; }
    .stepper-row { display: grid; grid-template-columns: 1fr 124px; align-items: center; gap: 10px; }
    .stepper-row b { font-size: 15px; }
    .stepper { height: 42px; border-radius: 14px; border: 1px solid var(--line); background: var(--surface-soft); display: grid; grid-template-columns: 38px 1fr 38px; align-items: center; text-align: center; font-weight: 940; }
    .stepper button { height: 100%; font-size: 20px; font-weight: 940; }

    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
    .chip { min-height: 38px; display: inline-flex; align-items: center; gap: 7px; padding: 0 12px; border-radius: 999px; border: 1px solid var(--line); background: var(--surface-soft); color: var(--text-soft); font-size: 13px; font-weight: 900; }
    .chip.on { color: var(--primary); background: var(--primary-soft); border-color: #cfe7da; }
    .wizard-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin: 12px 0; }
    .wizard-step { height: 7px; border-radius: 999px; background: #e6ebe3; }
    .wizard-step.on { background: var(--primary); }
    .result-box { padding: 14px; border-radius: 18px; background: var(--surface-soft); border: 1px solid var(--line); color: var(--text-soft); font-size: 14px; font-weight: 720; line-height: 1.62; }

    .toast { position: fixed; left: 50%; bottom: 100px; transform: translateX(-50%) translateY(12px); z-index: 90; max-width: calc(100% - 28px); opacity: 0; pointer-events: none; transition: .16s ease; padding: 10px 14px; border-radius: 999px; color: #fff; background: rgba(23, 38, 58, .96); font-size: 13px; font-weight: 860; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .snackbar { position: fixed; left: 10px; right: 10px; bottom: 96px; max-width: 820px; margin: 0 auto; min-height: 54px; z-index: 91; display: none; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 12px 10px 15px; border-radius: 18px; background: rgba(23, 38, 58, .97); color: #fff; box-shadow: 0 16px 34px rgba(23, 38, 58, .16); }
    .snackbar.show { display: flex; animation: snack .16s ease; }
    @keyframes snack { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .snackbar-text { font-size: 13px; font-weight: 760; }
    .snackbar button { min-height: 36px; border-radius: 12px; background: rgba(255,255,255,.13); color: #fff; padding: 0 12px; font-size: 13px; font-weight: 930; white-space: nowrap; }

    @media (max-width: 480px) {
      body { padding-left: 8px; padding-right: 8px; }
      .overview-grid, .action-grid { grid-template-columns: 1fr; }
      .list-row { grid-template-columns: minmax(0, 1fr) 52px 98px; padding-left: 12px; padding-right: 12px; }
      .status-pill { min-width: 94px; font-size: 11px; }
      .task-row { grid-template-columns: minmax(0, 1fr) 56px 104px; }
      .balance-grid, .metric-grid, .form-row { grid-template-columns: 1fr; }
      .btn-row { grid-template-columns: 1fr; }
      .day-cell { min-height: 48px; border-radius: 14px; }
      .hero h2, .qazo-top h2 { font-size: 24px; }
      .stats-hero h2 { font-size: 30px; }
      .stepper-row { grid-template-columns: 1fr 116px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <button class="icon-button" type="button" onclick="openInfo()" aria-label="Ilova haqida">ⓘ</button>
    <div class="app-title">
      <h1 id="pageTitle">Namozlarim</h1>
      <p id="pageSubtitle">Bugungi namozlar va qazo rejasi</p>
    </div>
    <button class="icon-button" type="button" onclick="openSettings()" aria-label="Sozlamalar">⚙</button>
  </header>

  <main>
    <section id="screen-today" class="screen active">
      <div id="todayHero" class="card hero section"></div>
      <div id="todayOverview" class="overview-grid section"></div>

      <div class="section-title">
        <h2>Bugungi namozlar</h2>
        <span id="todayDateLabel"></span>
      </div>
      <div id="prayerList" class="card section"></div>

      <div id="todayQazo" class="card card-pad section"></div>
    </section>

    <section id="screen-qazo" class="screen">
      <div id="qazoHero" class="card qazo-hero section"></div>

      <div class="section-title">
        <h2>Bugungi qazo vazifasi</h2>
        <span>Reja bo‘yicha</span>
      </div>
      <div id="qazoTasks" class="card section"></div>

      <div class="section-title">
        <h2>Qazo qoldig‘i</h2>
        <span>Namozlar kesimida</span>
      </div>
      <div id="qazoBalance" class="card section"></div>

      <div class="section-title">
        <h2>Qo‘shish va sozlash</h2>
        <span>Kerakli amallar</span>
      </div>
      <div class="action-grid section">
        <button class="action-card" type="button" onclick="openAddQazo()"><span class="big">＋</span><strong>Tez qo‘shish</strong><small>1 ta qazo qo‘shish</small></button>
        <button class="action-card" type="button" onclick="openCalculator()"><span class="big">∑</span><strong>Kalkulyator</strong><small>Davr bo‘yicha hisoblash</small></button>
        <button class="action-card" type="button" onclick="openPlan()"><span class="big">✓</span><strong>Rejani sozlash</strong><small>Kunlik tartib</small></button>
      </div>
    </section>

    <section id="screen-calendar" class="screen">
      <div class="card calendar-card section">
        <div class="calendar-top">
          <strong id="calendarMonth">—</strong>
          <div class="calendar-controls">
            <button type="button" onclick="changeMonth(-1)" aria-label="Oldingi oy">‹</button>
            <button type="button" onclick="changeMonth(1)" aria-label="Keyingi oy">›</button>
          </div>
        </div>
        <div id="calendarSummary" class="overview-grid section"></div>
        <div id="weekGrid" class="week-grid"></div>
        <div id="monthGrid" class="month-grid"></div>
        <div id="calendarDetail" class="calendar-detail"></div>
      </div>

      <div class="section-title">
        <h2 id="selectedDateTitle">Kun holati</h2>
        <span>Tanlangan kun</span>
      </div>
      <div id="calendarPrayerList" class="card section"></div>
    </section>

    <section id="screen-stats" class="screen">
      <div id="statsHero" class="card stats-hero section"></div>
      <div id="statsTip" class="card tip-card section"></div>
      <div id="metrics" class="metric-grid section"></div>

      <div class="section-title">
        <h2>Ko‘proq e’tibor kerak</h2>
        <span>Qoldiq bo‘yicha</span>
      </div>
      <div id="statsBreakdown" class="card balance-list section"></div>
    </section>
  </main>

  <footer class="app-footer">
    <nav class="nav-bar" aria-label="Asosiy menyu">
      <button id="nav-today" class="nav-item active" type="button" onclick="switchScreen('today')"><span class="ico">⌂</span><span>Bugun</span></button>
      <button id="nav-qazo" class="nav-item" type="button" onclick="switchScreen('qazo')"><span class="ico">✓</span><span>Qazo</span></button>
      <button id="nav-calendar" class="nav-item" type="button" onclick="switchScreen('calendar')"><span class="ico">▦</span><span>Kalendar</span></button>
      <button id="nav-stats" class="nav-item" type="button" onclick="switchScreen('stats')"><span class="ico">↗</span><span>Natija</span></button>
    </nav>
  </footer>

  <div id="modal" class="modal" onclick="closeModal(event)"><div id="sheet" class="sheet" onclick="event.stopPropagation()"><div id="modalBody"></div></div></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="snackbar" class="snackbar" role="status" aria-live="polite"><div id="snackbarText" class="snackbar-text"></div><button id="snackbarAction" type="button"></button></div>

  <script>
    const tg = window.Telegram?.WebApp;
    tg?.ready();
    tg?.expand();

    const PRAYERS = ['fajr', 'dhuhr', 'asr', 'maghrib', 'isha'];
    const QAZO = ['fajr', 'dhuhr', 'asr', 'maghrib', 'isha', 'witr'];
    const META = {
      fajr: { name: 'Bomdod', icon: '🌙', time: '05:05' },
      sunrise: { name: 'Quyosh', icon: '☀️', time: '06:24' },
      dhuhr: { name: 'Peshin', icon: '☀️', time: '12:24' },
      asr: { name: 'Asr', icon: '🌇', time: '16:58' },
      maghrib: { name: 'Shom', icon: '🌆', time: '19:41' },
      isha: { name: 'Xufton', icon: '🌙', time: '21:02' },
      witr: { name: 'Vitr', icon: '⭐', time: '—' }
    };

    const STORAGE_KEY = 'namozlarim_redesign_state_v1';
    const todayISO = () => new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Tashkent' }).format(new Date());
    const nowMin = () => {
      const [h, m] = new Intl.DateTimeFormat('en-GB', { timeZone: 'Asia/Tashkent', hour: '2-digit', minute: '2-digit', hour12: false }).format(new Date()).split(':').map(Number);
      return h * 60 + m;
    };
    const addDays = (iso, n) => { const d = new Date(iso + 'T00:00:00Z'); d.setUTCDate(d.getUTCDate() + n); return d.toISOString().slice(0, 10); };
    const monthShift = (ym, n) => { const [y,m] = ym.split('-').map(Number); const d = new Date(Date.UTC(y, m - 1 + n, 1)); return d.toISOString().slice(0, 7); };
    const esc = s => String(s ?? '').replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[m]));
    const count = n => Number(n || 0).toLocaleString('ru-RU') + ' ta';
    const fmtDate = iso => new Intl.DateTimeFormat('uz-Latn-UZ', { timeZone: 'Asia/Tashkent', day: 'numeric', month: 'long', year: 'numeric' }).format(new Date(iso + 'T00:00:00'));
    const fmtShort = iso => new Intl.DateTimeFormat('uz-Latn-UZ', { timeZone: 'Asia/Tashkent', day: '2-digit', month: '2-digit', year: 'numeric' }).format(new Date(iso + 'T00:00:00'));
    const monthName = ym => new Intl.DateTimeFormat('uz-Latn-UZ', { timeZone: 'Asia/Tashkent', month: 'long', year: 'numeric' }).format(new Date(ym + '-01T00:00:00'));
    const parseTime = t => { if (!t || t === '—') return 0; const [h,m] = t.split(':').map(Number); return h * 60 + m; };

    function defaultState() {
      const t = todayISO();
      const prayers = Object.fromEntries(PRAYERS.map(k => [k, 'pending']));
      return {
        city: 'Toshkent',
        selectedDate: t,
        visibleMonth: t.slice(0, 7),
        screen: 'today',
        days: {
          [t]: { prayers }
        },
        qazo: { fajr: 12, dhuhr: 18, asr: 9, maghrib: 6, isha: 14, witr: 4 },
        completed: { fajr: 3, dhuhr: 2, asr: 1, maghrib: 1, isha: 2, witr: 0 },
        plan: { enabled: true, targets: { fajr: 1, dhuhr: 1, asr: 1, maghrib: 0, isha: 1, witr: 0 }, doneToday: { fajr: 0, dhuhr: 0, asr: 0, maghrib: 0, isha: 0, witr: 0 } },
        history: []
      };
    }

    let S = loadState();
    let calcDraft = null;

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return normalize(JSON.parse(raw));
      } catch (e) {}
      return normalize(defaultState());
    }

    function normalize(s) {
      const t = todayISO();
      s = { ...defaultState(), ...(s || {}) };
      s.selectedDate ||= t;
      s.visibleMonth ||= s.selectedDate.slice(0, 7);
      s.days ||= {};
      if (!s.days[t]) s.days[t] = { prayers: Object.fromEntries(PRAYERS.map(k => [k, 'pending'])) };
      QAZO.forEach(k => {
        s.qazo[k] = Number(s.qazo?.[k] || 0);
        s.completed[k] = Number(s.completed?.[k] || 0);
        s.plan.targets[k] = Number(s.plan?.targets?.[k] || 0);
        s.plan.doneToday[k] = Number(s.plan?.doneToday?.[k] || 0);
      });
      Object.keys(s.days).forEach(date => {
        s.days[date].prayers = { ...Object.fromEntries(PRAYERS.map(k => [k, 'pending'])), ...(s.days[date].prayers || {}) };
      });
      return s;
    }

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(S)); }
    function day(iso = S.selectedDate) {
      if (!S.days[iso]) S.days[iso] = { prayers: Object.fromEntries(PRAYERS.map(k => [k, 'pending'])) };
      return S.days[iso];
    }
    function prayerStatus(k, iso = S.selectedDate) { return day(iso).prayers[k] || 'pending'; }
    function qazoTotal() { return QAZO.reduce((a,k) => a + Number(S.qazo[k] || 0), 0); }
    function completedTotal() { return QAZO.reduce((a,k) => a + Number(S.completed[k] || 0), 0); }
    function targetTotal() { return QAZO.reduce((a,k) => a + Number(S.plan.targets[k] || 0), 0); }
    function doneTodayTotal() { return QAZO.reduce((a,k) => a + Number(S.plan.doneToday[k] || 0), 0); }
    function leftTodayTotal() { return Math.max(0, targetTotal() - doneTodayTotal()); }
    function due(k) {
      if (S.selectedDate < todayISO()) return true;
      if (S.selectedDate > todayISO()) return false;
      return nowMin() >= parseTime(META[k].time);
    }
    function nextPrayer() {
      const now = nowMin();
      return PRAYERS.find(k => parseTime(META[k].time) > now) || null;
    }
    function currentActionPrayer() { return PRAYERS.find(k => due(k) && prayerStatus(k) === 'pending') || null; }
    function statusText(k) {
      const st = prayerStatus(k);
      if (st === 'prayed') return 'O‘qildi';
      if (st === 'missed') return 'Qazo bo‘ldi';
      return due(k) ? 'Belgilash kerak' : 'Vaqti kirmagan';
    }
    function statusClass(k) {
      const st = prayerStatus(k);
      if (st === 'prayed') return 'success';
      if (st === 'missed') return 'danger';
      return due(k) ? 'warning' : '';
    }
    function haptic(type = 'light') { try { tg?.HapticFeedback?.impactOccurred(type); } catch(e) {} }

    function render() {
      renderHeader();
      renderToday();
      renderQazo();
      renderCalendar();
      renderStats();
      save();
    }

    function renderHeader() {
      const meta = {
        today: ['Namozlarim', 'Bugungi namozlar va qazo rejasi'],
        qazo: ['Qazo', 'Qoldiq, reja va ado qilish'],
        calendar: ['Kalendar', 'Kunlar bo‘yicha namoz holati'],
        stats: ['Natija', 'Umumiy holat va yumshoq tavsiyalar']
      }[S.screen] || ['Namozlarim', 'Bugungi holat'];
      pageTitle.textContent = meta[0];
      pageSubtitle.textContent = meta[1];
      todayDateLabel.textContent = fmtDate(todayISO());
    }

    function renderToday() {
      const action = currentActionPrayer();
      const n = nextPrayer();
      const marked = PRAYERS.filter(k => ['prayed', 'missed'].includes(prayerStatus(k))).length;
      if (action) {
        todayHero.innerHTML = `
          <div class="hero-kicker">● Hozir bajariladigan amal</div>
          <h2>${META[action].name} namozini belgilang</h2>
          <p>Vaqti: ${META[action].time}. Bugun ${marked} / ${PRAYERS.length} ta namoz belgilangan.</p>
          <div class="btn-row">
            <button class="btn primary" type="button" onclick="setPrayer('${action}', 'prayed')">O‘qidim</button>
            <button class="btn red" type="button" onclick="setPrayer('${action}', 'missed')">Qazo bo‘ldi</button>
          </div>`;
      } else if (n) {
        todayHero.innerHTML = `
          <div class="hero-kicker">● Keyingi namoz</div>
          <h2>${META[n].name}</h2>
          <p>Vaqti: ${META[n].time}. Vaqti kirganda belgilash tugmalari shu yerda chiqadi.</p>`;
      } else {
        todayHero.innerHTML = `
          <div class="hero-kicker">● Bugungi jadval</div>
          <h2>Bugungi namoz vaqtlari yakunlandi</h2>
          <p>Kerak bo‘lsa, pastdagi ro‘yxatdan holatlarni qayta tahrirlashingiz mumkin.</p>`;
      }

      todayOverview.innerHTML = `
        <div class="overview-card primary"><span>Bugungi holat</span><strong>${marked} / ${PRAYERS.length}</strong></div>
        <div class="overview-card"><span>Qazo reja</span><strong>${doneTodayTotal()} / ${targetTotal()}</strong></div>
        <div class="overview-card"><span>${esc(S.city)}</span><strong>${new Intl.DateTimeFormat('en-GB', { timeZone: 'Asia/Tashkent', hour: '2-digit', minute: '2-digit', hour12: false }).format(new Date())}</strong></div>`;

      prayerList.innerHTML = prayerRowsHTML(S.selectedDate);

      const target = targetTotal(), done = doneTodayTotal(), left = leftTodayTotal();
      const pct = target ? Math.min(100, Math.round(done / target * 100)) : 0;
      todayQazo.innerHTML = `
        <div class="qazo-top">
          <div>
            <h2 style="font-size:20px">Bugungi qazo rejasi</h2>
            <p>${target ? `${done} / ${target} ado qilindi · ${count(left)} qoldi` : 'Kunlik reja hali belgilanmagan'}</p>
          </div>
          <button class="btn link" type="button" onclick="switchScreen('qazo')">Qazoga o‘tish</button>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        ${target ? '' : '<button class="btn primary full" type="button" onclick="openPlan()">Reja tuzish</button>'}`;
    }

    function prayerRowsHTML(iso) {
      return PRAYERS.map(k => {
        const disabled = iso > todayISO() || (!due(k) && iso === todayISO());
        const onclick = disabled ? `showToast('Bu namoz vaqti hali kirmagan')` : `openPrayerSheet('${k}')`;
        return `<button class="list-row" type="button" onclick="${onclick}">
          <span class="row-main">
            <span class="row-icon">${META[k].icon}</span>
            <span class="row-text"><strong>${META[k].name}</strong><small>${iso === todayISO() ? 'Bugun' : fmtShort(iso)}</small></span>
          </span>
          <span class="row-time">${META[k].time}</span>
          <span class="status-pill ${statusClass(k)}">${statusText(k)}</span>
        </button>`;
      }).join('');
    }

    function renderQazo() {
      const total = qazoTotal(), target = targetTotal(), done = doneTodayTotal(), left = leftTodayTotal();
      const pct = target ? Math.min(100, Math.round(done / target * 100)) : 0;
      qazoHero.innerHTML = `
        <div class="qazo-top">
          <div>
            <h2>${left ? 'Bugungi vazifani davom ettiring' : target ? 'Bugungi reja bajarildi' : 'Qazo rejani boshlang'}</h2>
            <p>${target ? `${done} / ${target} ado qilindi. ${left ? count(left) + ' qoldi.' : 'Alloh qabul qilsin.'}` : 'Har kuni nechta qazo ado qilishingizni belgilang.'}</p>
          </div>
          <div class="qazo-pill">${total ? count(total) : 'Qoldiq yo‘q'}</div>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        ${target ? '' : '<button class="btn primary full" type="button" onclick="openPlan()">Reja tuzish</button>'}`;

      const rows = QAZO.filter(k => S.qazo[k] > 0 || S.plan.targets[k] > 0).map(k => {
        const target = S.plan.targets[k] || 0;
        const done = S.plan.doneToday[k] || 0;
        const left = Math.max(0, target - done);
        const noBalance = S.qazo[k] <= 0;
        const isDone = target > 0 && left <= 0;
        return `<div class="task-row">
          <div><div class="task-title">${META[k].icon} ${META[k].name}</div><div class="task-meta">Qoldiq: ${count(S.qazo[k])}</div></div>
          <div class="task-count"><span>${done}</span> / ${target}</div>
          <button class="task-action ${isDone || noBalance ? 'done' : ''}" type="button" ${isDone || noBalance ? 'disabled' : ''} onclick="completeQazo('${k}')">${isDone ? 'Bajarildi' : noBalance ? 'Qoldiq yo‘q' : 'Ado qildim'}</button>
        </div>`;
      }).join('');
      qazoTasks.innerHTML = rows || `<div class="empty"><strong>Bugun uchun vazifa yo‘q</strong><p>Qazo qoldig‘i qo‘shing yoki kunlik reja tuzing.</p><button class="btn primary full" type="button" onclick="openAddQazo()">Qazo qo‘shish</button></div>`;

      const top = [...QAZO].sort((a,b) => S.qazo[b] - S.qazo[a])[0];
      qazoBalance.innerHTML = `
        <div class="card-pad">
          <div class="balance-grid">
            <div class="overview-card primary"><span>Jami qoldiq</span><strong>${count(total)}</strong></div>
            <div class="overview-card"><span>Eng ko‘p</span><strong>${META[top].name} · ${count(S.qazo[top])}</strong></div>
          </div>
        </div>
        <div class="balance-list">${QAZO.map(k => `<div class="balance-row"><span>${META[k].icon} ${META[k].name}</span><strong>${count(S.qazo[k])}</strong></div>`).join('')}</div>`;
    }

    function renderCalendar() {
      calendarMonth.textContent = monthName(S.visibleMonth);
      weekGrid.innerHTML = ['D', 'S', 'Ch', 'P', 'J', 'Sh', 'Y'].map(x => `<div>${x}</div>`).join('');
      const [y, m] = S.visibleMonth.split('-').map(Number);
      const daysInMonth = new Date(Date.UTC(y, m, 0)).getUTCDate();
      const first = new Date(Date.UTC(y, m - 1, 1));
      const offset = (first.getUTCDay() + 6) % 7;
      let html = ''.padStart(0, '');
      for (let i = 0; i < offset; i++) html += '<button class="day-cell empty" type="button"></button>';
      for (let d = 1; d <= daysInMonth; d++) {
        const iso = `${S.visibleMonth}-${String(d).padStart(2, '0')}`;
        const s = summaryForDay(iso);
        let cls = 'day-status';
        let label = '—';
        if (s.missed > 0) { cls += ' bad'; label = '!' + s.missed; }
        else if (s.prayed === PRAYERS.length) { cls += ' good'; label = '✓'; }
        else if (s.prayed > 0) { cls += ' good'; label = '✓ ' + s.prayed; }
        const cellCls = ['day-cell', iso === todayISO() ? 'today' : '', iso === S.selectedDate ? 'selected' : '', iso > todayISO() ? 'future' : ''].join(' ');
        html += `<button class="${cellCls}" type="button" onclick="selectDate('${iso}')"><span class="day-number">${d}</span><span class="${cls}">${label}</span></button>`;
      }
      monthGrid.innerHTML = html;
      const monthS = monthSummary(S.visibleMonth);
      calendarSummary.innerHTML = `
        <div class="overview-card primary"><span>O‘qilgan kunlar</span><strong>${monthS.good}</strong></div>
        <div class="overview-card"><span>Qazo bor kunlar</span><strong>${monthS.bad}</strong></div>
        <div class="overview-card"><span>Belgilanmagan</span><strong>${monthS.pending}</strong></div>`;
      const selected = summaryForDay(S.selectedDate);
      selectedDateTitle.textContent = fmtDate(S.selectedDate);
      calendarDetail.innerHTML = `<strong>${fmtDate(S.selectedDate)}</strong><p>O‘qilgan: ${selected.prayed} · Qazo: ${selected.missed} · Belgilanmagan: ${selected.pending}</p>`;
      calendarPrayerList.innerHTML = prayerRowsHTML(S.selectedDate);
    }

    function summaryForDay(iso) {
      const d = day(iso);
      const vals = PRAYERS.map(k => d.prayers[k] || 'pending');
      return {
        prayed: vals.filter(v => v === 'prayed').length,
        missed: vals.filter(v => v === 'missed').length,
        pending: vals.filter(v => v === 'pending').length
      };
    }
    function monthSummary(ym) {
      const [y,m] = ym.split('-').map(Number);
      const daysInMonth = new Date(Date.UTC(y, m, 0)).getUTCDate();
      const out = { good: 0, bad: 0, pending: 0 };
      for (let d = 1; d <= daysInMonth; d++) {
        const iso = `${ym}-${String(d).padStart(2, '0')}`;
        if (iso > todayISO()) continue;
        const s = summaryForDay(iso);
        if (s.missed > 0) out.bad++;
        else if (s.prayed === PRAYERS.length) out.good++;
        else out.pending++;
      }
      return out;
    }

    function renderStats() {
      const total = qazoTotal();
      const done = completedTotal();
      const base = total + done;
      const pct = base ? Math.round(done / base * 100) : 100;
      const daily = Math.max(1, targetTotal());
      const days = total ? Math.ceil(total / daily) : 0;
      const top = [...QAZO].sort((a,b) => S.qazo[b] - S.qazo[a])[0];
      statsHero.innerHTML = `<div class="eyebrow">Umumiy holat</div><h2>${count(total)} qoldiq</h2><p>Ado qilingan: ${count(done)} · umumiy progress: ${pct}%</p><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>`;
      statsTip.innerHTML = `<div class="tip-icon">✦</div><div><strong>${total ? `${META[top].name} bo‘yicha ko‘proq e’tibor kerak` : 'Qazo qoldig‘i yo‘q'}</strong><p>${total ? `Hozirgi reja bilan taxminiy tugash muddati: ${days} kun. Bugun qo‘shimcha 1 ta ${META[top].name} ado qilsangiz, balans tezroq kamayadi.` : 'Bugungi namozlarni vaqtida belgilab boring. Reja davom etsa, tavsiyalar shu yerda ko‘rinadi.'}</p></div>`;
      metrics.innerHTML = `
        <div class="card metric"><span>Qazo qoldig‘i</span><strong class="text-danger">${count(total)}</strong><small>Namozlar kesimida</small></div>
        <div class="card metric"><span>Ado qilingan</span><strong class="text-primary">${count(done)}</strong><small>Umumiy</small></div>
        <div class="card metric"><span>Bugungi reja</span><strong class="text-primary">${doneTodayTotal()} / ${targetTotal()}</strong><small>Kunlik vazifa</small></div>
        <div class="card metric"><span>Taxminiy muddat</span><strong class="text-blue">${total ? days + ' kun' : '—'}</strong><small>Hozirgi reja bo‘yicha</small></div>`;
      statsBreakdown.innerHTML = [...QAZO].sort((a,b) => S.qazo[b] - S.qazo[a]).map(k => `<div class="balance-row"><span>${META[k].icon} ${META[k].name}</span><strong>${count(S.qazo[k])}</strong></div>`).join('');
    }

    function switchScreen(screen) {
      haptic();
      S.screen = screen;
      document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById('screen-' + screen).classList.add('active');
      document.getElementById('nav-' + screen).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      render();
    }

    function selectDate(iso) {
      if (iso > todayISO()) return showToast('Kelajakdagi kunni belgilab bo‘lmaydi');
      S.selectedDate = iso;
      S.visibleMonth = iso.slice(0, 7);
      switchScreen('calendar');
    }
    function changeMonth(n) { S.visibleMonth = monthShift(S.visibleMonth, n); render(); }

    function openPrayerSheet(k) {
      modalBody.innerHTML = `<div class="modal-title">${META[k].icon} ${META[k].name}</div><div class="modal-sub">Vaqti: ${META[k].time}\nHozirgi holat: ${statusText(k)}</div><div class="modal-actions"><button class="btn primary" type="button" onclick="setPrayer('${k}', 'prayed')">O‘qidim</button><button class="btn red" type="button" onclick="setPrayer('${k}', 'missed')">Qazo sifatida belgilash</button><button class="btn gray" type="button" onclick="setPrayer('${k}', 'pending')">Belgini olib tashlash</button><button class="btn gray" type="button" onclick="closeModal()">Yopish</button></div>`;
      openModal();
    }

    function setPrayer(k, status) {
      if (S.selectedDate > todayISO()) return showToast('Kelajakdagi kunni belgilab bo‘lmaydi');
      if (S.selectedDate === todayISO() && status !== 'pending' && !due(k)) return showToast('Bu namoz vaqti hali kirmagan');
      const old = prayerStatus(k);
      if (old === status) return closeModal();
      day().prayers[k] = status;
      if (status === 'missed' && old !== 'missed') S.qazo[k] += 1;
      if (old === 'missed' && status !== 'missed') S.qazo[k] = Math.max(0, S.qazo[k] - 1);
      closeModal();
      render();
      showSnackbar(status === 'prayed' ? 'O‘qildi deb saqlandi' : status === 'missed' ? 'Qazo sifatida saqlandi' : 'Belgi olib tashlandi', 'Bekor qilish', () => {
        day().prayers[k] = old;
        if (status === 'missed' && old !== 'missed') S.qazo[k] = Math.max(0, S.qazo[k] - 1);
        if (old === 'missed' && status !== 'missed') S.qazo[k] += 1;
        render();
      });
    }

    function completeQazo(k) {
      if (S.qazo[k] <= 0) return showToast('Bu namoz bo‘yicha qoldiq yo‘q');
      if ((S.plan.doneToday[k] || 0) >= (S.plan.targets[k] || 0) && S.plan.targets[k] > 0) return showToast('Bugungi vazifa bajarilgan');
      S.qazo[k] -= 1;
      S.completed[k] += 1;
      S.plan.doneToday[k] += 1;
      S.history.unshift({ id: Date.now(), type: 'complete', prayer: k, date: todayISO() });
      render();
      showSnackbar('Qazo ado qilindi', 'Bekor qilish', () => {
        S.qazo[k] += 1;
        S.completed[k] = Math.max(0, S.completed[k] - 1);
        S.plan.doneToday[k] = Math.max(0, S.plan.doneToday[k] - 1);
        render();
      });
    }

    function openAddQazo() {
      modalBody.innerHTML = `<div class="modal-title">Qazo qo‘shish</div><div class="modal-sub">Qaysi namoz bo‘yicha 1 ta qazo qo‘shmoqchisiz?</div><div class="modal-actions">${QAZO.map(k => `<button class="btn green" type="button" onclick="addQazo('${k}')">${META[k].icon} ${META[k].name} +1</button>`).join('')}<button class="btn gray" type="button" onclick="closeModal()">Yopish</button></div>`;
      openModal();
    }
    function addQazo(k) {
      S.qazo[k] += 1;
      S.history.unshift({ id: Date.now(), type: 'add', prayer: k, date: todayISO() });
      closeModal();
      render();
      showSnackbar('1 ta qazo qo‘shildi', 'Bekor qilish', () => { S.qazo[k] = Math.max(0, S.qazo[k] - 1); render(); });
    }

    function openPlan() {
      const d = JSON.parse(JSON.stringify(S.plan.targets));
      modalBody.innerHTML = `<div class="modal-title">Kunlik qazo rejasi</div><div class="modal-sub">Har kuni qaysi namozdan nechta qazo ado qilishingizni belgilang.</div><div class="seg"><button type="button" onclick="presetPlan('balanced')">Teng</button><button type="button" onclick="presetPlan('focus')">Fokus</button><button type="button" class="on">Qo‘lda</button></div><div id="planEditor" class="stepper-list"></div><button class="btn primary full" type="button" onclick="savePlan()">Saqlash</button><button class="btn gray full" type="button" onclick="closeModal()">Bekor qilish</button>`;
      window.planDraft = d;
      renderPlanEditor();
      openModal();
    }
    function renderPlanEditor() {
      planEditor.innerHTML = QAZO.map(k => `<div class="stepper-row"><div>${META[k].icon} <b>${META[k].name}</b></div><div class="stepper"><button type="button" onclick="changePlan('${k}', -1)">−</button><span>${window.planDraft[k] || 0}</span><button type="button" onclick="changePlan('${k}', 1)">+</button></div></div>`).join('');
    }
    function changePlan(k, n) { window.planDraft[k] = Math.max(0, Math.min(99, (window.planDraft[k] || 0) + n)); renderPlanEditor(); }
    function presetPlan(type) {
      if (type === 'balanced') window.planDraft = { fajr: 1, dhuhr: 1, asr: 1, maghrib: 1, isha: 1, witr: 0 };
      if (type === 'focus') {
        const top = [...QAZO].sort((a,b) => S.qazo[b] - S.qazo[a])[0];
        window.planDraft = Object.fromEntries(QAZO.map(k => [k, k === top ? 3 : 0]));
      }
      renderPlanEditor();
    }
    function savePlan() { S.plan.targets = { ...S.plan.targets, ...window.planDraft }; closeModal(); render(); showToast('Reja saqlandi'); }

    function openCalculator() {
      calcDraft = { step: 1, start: addDays(todayISO(), -30), end: todayISO(), selected: [...QAZO], result: null };
      renderCalculator();
    }
    function calcSteps() { return `<div class="wizard-steps"><div class="wizard-step ${calcDraft.step >= 1 ? 'on' : ''}"></div><div class="wizard-step ${calcDraft.step >= 2 ? 'on' : ''}"></div><div class="wizard-step ${calcDraft.step >= 3 ? 'on' : ''}"></div></div>`; }
    function renderCalculator() {
      let body = '';
      if (calcDraft.step === 1) {
        body = `<div class="modal-title">Davrni tanlang</div><div class="modal-sub">Avval qazo hisoblanadigan davrni tanlang.</div>${calcSteps()}<div class="form-row"><div><div class="form-label">Boshlanish sanasi</div><input id="calcStart" class="input" type="date" value="${calcDraft.start}" max="${todayISO()}"></div><div><div class="form-label">Tugash sanasi</div><input id="calcEnd" class="input" type="date" value="${calcDraft.end}" max="${todayISO()}"></div></div><button class="btn primary full" type="button" onclick="calcNextDates()">Davom etish</button><button class="btn gray full" type="button" onclick="closeModal()">Yopish</button>`;
      }
      if (calcDraft.step === 2) {
        body = `<div class="modal-title">Namozlarni tanlang</div><div class="modal-sub">Tanlangan davrdagi HAR BIR KUNDA qazo bo‘lgan namozlarni belgilang. Agar ayrim kunlar farq qilsa, avval umumiy davrni qo‘shing, keyin kalendardan tuzating.</div>${calcSteps()}<div class="chip-row">${QAZO.map(k => `<button class="chip ${calcDraft.selected.includes(k) ? 'on' : ''}" type="button" onclick="toggleCalc('${k}')">${META[k].icon} ${META[k].name}</button>`).join('')}</div><div class="btn-row"><button class="btn gray" type="button" onclick="calcDraft.step=1;renderCalculator()">Ortga</button><button class="btn primary" type="button" onclick="calcPreview()">Hisoblash</button></div>`;
      }
      if (calcDraft.step === 3) {
        const r = calcDraft.result;
        body = `<div class="modal-title">Natijani tekshiring</div><div class="modal-sub">Balansga qo‘shishdan oldin hisobni diqqat bilan tekshiring.</div>${calcSteps()}<div class="result-box"><b>Davr:</b> ${fmtShort(r.start)} — ${fmtShort(r.end)}<br><b>Kunlar:</b> ${r.days}<br><b>Tanlangan namozlar:</b> ${r.names}<br><b>Yangi qo‘shiladi:</b> ${count(r.total)}</div><div class="btn-row"><button class="btn gray" type="button" onclick="calcDraft.step=2;renderCalculator()">Ortga</button><button class="btn primary" type="button" onclick="applyCalc()">Balansga qo‘shish</button></div>`;
      }
      modalBody.innerHTML = body;
      openModal('full');
    }
    function calcNextDates() {
      calcDraft.start = calcStart.value;
      calcDraft.end = calcEnd.value;
      if (!calcDraft.start || !calcDraft.end) return showToast('Sanalarni kiriting');
      if (calcDraft.start > calcDraft.end) return showToast('Boshlanish sanasi tugash sanasidan keyin bo‘lmasin');
      calcDraft.step = 2;
      renderCalculator();
    }
    function toggleCalc(k) { calcDraft.selected = calcDraft.selected.includes(k) ? calcDraft.selected.filter(x => x !== k) : [...calcDraft.selected, k]; renderCalculator(); }
    function calcPreview() {
      if (!calcDraft.selected.length) return showToast('Kamida bitta namozni tanlang');
      const days = Math.round((new Date(calcDraft.end + 'T00:00:00Z') - new Date(calcDraft.start + 'T00:00:00Z')) / 86400000) + 1;
      calcDraft.result = { start: calcDraft.start, end: calcDraft.end, days, total: days * calcDraft.selected.length, names: calcDraft.selected.map(k => META[k].name).join(', ') };
      calcDraft.step = 3;
      renderCalculator();
    }
    function applyCalc() {
      const r = calcDraft.result;
      calcDraft.selected.forEach(k => S.qazo[k] += r.days);
      closeModal();
      render();
      showSnackbar(count(r.total) + ' qazo balansga qo‘shildi', 'Bekor qilish', () => {
        calcDraft.selected.forEach(k => S.qazo[k] = Math.max(0, S.qazo[k] - r.days));
        render();
      });
    }

    function openSettings() {
      modalBody.innerHTML = `<div class="modal-title">Sozlamalar</div><div class="modal-sub">${esc(S.city)} · demo HTML versiya</div><div class="modal-actions"><button class="btn gray" type="button" onclick="resetDemo()">Demo ma’lumotlarni tiklash</button><button class="btn gray" type="button" onclick="closeModal()">Yopish</button></div>`;
      openModal();
    }
    function resetDemo() { localStorage.removeItem(STORAGE_KEY); S = defaultState(); closeModal(); switchScreen('today'); showToast('Demo tiklandi'); }
    function openInfo() {
      modalBody.innerHTML = `<div class="modal-title">Bu versiyada nima o‘zgardi?</div><div class="modal-sub">App soddalashtirildi: Bugun ekrani faqat hozirgi amalga, Qazo ekrani esa qoldiq va kunlik vazifaga qaratildi. Har bir muhim actiondan keyin bekor qilish imkoniyati bor.</div><button class="btn primary full" type="button" onclick="closeModal()">Tushunarli</button>`;
      openModal();
    }

    function openModal(mode = '') { modal.classList.toggle('full', mode === 'full'); modal.classList.add('show'); }
    function closeModal(e) { if (e && e.target !== modal) return; modal.classList.remove('show', 'full'); }
    function showToast(msg) { toast.textContent = msg; toast.classList.add('show'); clearTimeout(toast._t); toast._t = setTimeout(() => toast.classList.remove('show'), 2200); }
    function showSnackbar(msg, action, fn) {
      snackbarText.textContent = msg;
      snackbarAction.textContent = action || '';
      snackbarAction.style.display = action && fn ? 'inline-flex' : 'none';
      snackbarAction.onclick = () => { snackbar.classList.remove('show'); fn?.(); };
      snackbar.classList.add('show');
      clearTimeout(snackbar._t);
      snackbar._t = setTimeout(() => snackbar.classList.remove('show'), 6500);
    }

    render();
    switchScreen(S.screen || 'today');
    setInterval(() => { if (S.screen === 'today') render(); }, 30000);
  </script>
</body>
</html>
